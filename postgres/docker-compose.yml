services:
  postgres:
    image: postgres:16
    container_name: postgres

    restart: unless-stopped

    environment:
      POSTGRES_USER: nextcloud
      POSTGRES_PASSWORD: Catvang1412!
      POSTGRES_DB: nextcloud

    volumes:
      - postgres_data:/var/lib/postgresql/data

    networks:
      - homelab

volumes:
  postgres_data:

networks:
  homelab:
    external: true
